<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Grid Displacement Reveal</title>
<style>
body {
margin: 0;
padding: 0;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
background-color: #1a1a1a;
overflow: hidden;
font-family: sans-serif;
}

canvas {
cursor: crosshair;
box-shadow: 0 20px 50px rgba(0,0,0,0.5);
border-radius: 8px;
}

.instructions {
position: absolute;
top: 20px;
color: white;
text-transform: uppercase;
letter-spacing: 2px;
font-size: 14px;
pointer-events: none;
}
</style>
</head>
<body>

<div class="instructions">Hover over the image to reveal</div>
<canvas id="glitchCanvas"></canvas>

<script>
const canvas = document.getElementById('glitchCanvas');
const ctx = canvas.getContext('2d');

// Dimensions for our canvas
const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 500;

// The size of the "glitch" blocks
const GRID_SIZE = 25;

// Setup our two images (Source and Destination)
const img1 = new Image();
const img2 = new Image();

// Using placeholder images for the demo
img1.src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&h=500&fit=crop';
img2.src = 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800&h=500&fit=crop';

let imagesLoaded = 0;

function init() {
imagesLoaded++;
// Wait until both images are loaded before starting
if (imagesLoaded < 2) return;

canvas.width = CANVAS_WIDTH;
canvas.height = CANVAS_HEIGHT;

const cols = Math.ceil(canvas.width / GRID_SIZE);
const rows = Math.ceil(canvas.height / GRID_SIZE);

// Create a grid of blocks
let blocks = [];
for (let y = 0; y < rows; y++) {
for (let x = 0; x < cols; x++) {
blocks.push({
x: x * GRID_SIZE,
y: y * GRID_SIZE,
opacity: 0 // 0 means img1 is visible, 1 means img2 is visible
});
}
}

// Track mouse position
let mouse = { x: -1000, y: -1000 };

canvas.addEventListener('mousemove', (e) => {
const rect = canvas.getBoundingClientRect();
mouse.x = e.clientX - rect.left;
mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mouseleave', () => {
mouse.x = -1000;
mouse.y = -1000;
});

// The main animation loop
function animate() {
// 1. Draw the base image (Image 1)
ctx.drawImage(img1, 0, 0, canvas.width, canvas.height);

// 2. Loop through the grid and calculate mouse interaction
blocks.forEach(b => {
// Calculate distance from the center of the block to the mouse
const dx = mouse.x - (b.x + GRID_SIZE / 2);
const dy = mouse.y - (b.y + GRID_SIZE / 2);
const dist = Math.sqrt(dx * dx + dy * dy);

// If the mouse is close to the block, reveal Image 2
if (dist < 80) {
b.opacity = 1;
} else {
// Slowly fade back to Image 1 to create the "trail" effect
b.opacity = Math.max(0, b.opacity - 0.03);
}

// 3. Draw the corresponding slice of Image 2 over Image 1
if (b.opacity > 0) {
ctx.globalAlpha = b.opacity;
// Draw only the specific grid section of img2
ctx.drawImage(
img2,
b.x, b.y, GRID_SIZE, GRID_SIZE, // Source coordinates
b.x, b.y, GRID_SIZE, GRID_SIZE // Destination coordinates
);
ctx.globalAlpha = 1.0; // Reset alpha
}
});

requestAnimationFrame(animate);
}

animate();
}

// Trigger initialization when images load
img1.onload = init;
img2.onload = init;
</script>
</body>
</html>
